<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Nyan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #020617; touch-action: none; user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .screen {
            background: rgba(0, 0, 0, 0.95); padding: 2rem; border-radius: 0.5rem;
            text-align: center; pointer-events: auto; border: 4px solid #ffffff;
            color: white; box-shadow: 0 0 25px rgba(0, 242, 255, 0.3); min-width: 320px;
        }
        .btn {
            background: #ff00ff; color: white; padding: 12px 35px; border: none;
            font-size: 1.5rem; font-weight: bold; cursor: pointer; margin-top: 15px;
            box-shadow: 4px 4px 0 #550055; border-radius: 0px; text-transform: uppercase;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #550055; }
        .score { position: absolute; top: 30px; font-size: 4rem; color: white; text-shadow: 4px 4px 0 #000; font-weight: bold; }
        .social-tag { margin-top: 15px; font-size: 0.9rem; color: #00f2ff; border-top: 1px solid #333; padding-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display" class="score hidden">0</div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1 class="text-4xl font-bold mb-2">FLAPPY<br><span class="text-pink-500">NYAN</span></h1>
            <p class="text-white text-xs tracking-widest uppercase mb-4">Original Classic Look</p>
            
            <button id="start-btn" class="btn">PLAY</button>

            <div class="social-tag">
                <p>xbox: mahim11184</p>
                <p>roblox: mahim_good</p>
            </div>
        </div>

        <!-- Try Again Screen -->
        <div id="over-screen" class="screen hidden">
            <h1 class="text-4xl font-bold mb-2 text-red-500">FAILED</h1>
            <p id="final-score" class="text-2xl mb-4 text-white">Score: 0</p>
            
            <button id="retry-btn" class="btn">Try Again</button>

            <div class="social-tag">
                <p>xbox: mahim11184</p>
                <p>roblox: mahim_good</p>
            </div>
        </div>
    </div>

    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const scoreUI = document.getElementById('score-display');
        
        let state = 'START', score = 0, frames = 0;
        // player.s reduced to 0.65 for a smaller "classic" scale
        const player = { x: 0, y: 0, v: 0, trail: [], stars: [], s: 0.65 };
        let pipes = [], bgStars = [], clouds = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width * 0.25;
            initBG();
        }
        window.addEventListener('resize', resize);

        function initBG() {
            bgStars = [];
            clouds = [];
            // Space stars
            for(let i=0; i<80; i++) {
                bgStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 2 + 1.5
                });
            }
            // Clouds (Stationary)
            for(let i=0; i<5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height / 2.5),
                    w: 120 + Math.random() * 80,
                    h: 50 + Math.random() * 30
                });
            }
        }

        function updateParticles() {
            if (frames % 4 === 0 && state === 'PLAYING') {
                player.stars.push({
                    x: player.x - 15,
                    y: player.y + (Math.random() - 0.5) * 25,
                    size: 5 + Math.random() * 5,
                    life: 1.0
                });
            }
            for (let i = player.stars.length - 1; i >= 0; i--) {
                const s = player.stars[i];
                s.x -= 6;
                s.life -= 0.035;
                if (s.life <= 0) player.stars.splice(i, 1);
            }
        }

        function drawCat(x, y) {
            const b = Math.sin(frames * 0.2) * 4;
            const s = player.s;
            
            // Rainbow Trail
            if(state === 'PLAYING') {
                player.trail.unshift({x, y: y+b});
                if(player.trail.length > 20) player.trail.pop();
            }
            player.trail.forEach((t, i) => {
                const colors = ['#ff0000','#ff9900','#ffff00','#33ff00','#0099ff','#6633ff'];
                const wave = Math.sin((frames - i) * 0.4) * 6;
                colors.forEach((c, ci) => {
                    ctx.fillStyle = c;
                    ctx.fillRect(t.x - (i*10*s) - 25*s, t.y + (ci*4.5*s) - 13*s + wave, 11*s, 4.5*s);
                });
            });

            // White Star Burst
            ctx.fillStyle = "white";
            player.stars.forEach(st => {
                ctx.globalAlpha = st.life;
                ctx.fillRect(st.x, st.y, st.size, 1.5);
                ctx.fillRect(st.x + st.size/2 - 0.75, st.y - st.size/2 + 0.75, 1.5, st.size);
            });
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.translate(x, y+b);
            
            // Feet/Tail
            ctx.fillStyle = '#999';
            const walk = (Math.floor(frames/6) % 2 === 0) ? 2 : -2;
            ctx.fillRect(-10*s, 15*s+walk, 5*s, 3*s); ctx.fillRect(5*s, 15*s-walk, 5*s, 3*s);
            ctx.fillRect(-26*s, -3*s+walk, 10*s, 7*s); 

            // Pop-tart
            ctx.fillStyle = '#ffcc99'; ctx.fillRect(-18*s, -15*s, 36*s, 30*s);
            ctx.fillStyle = '#ff66aa'; ctx.fillRect(-14*s, -11*s, 28*s, 22*s);
            ctx.fillStyle = '#ff0088'; ctx.fillRect(-8*s, -5*s, 2*s, 2*s); ctx.fillRect(4*s, 3*s, 2*s, 2*s);

            // Cute Face
            ctx.fillStyle = '#999';
            ctx.fillRect(12*s, -14*s, 18*s, 17*s);
            ctx.fillRect(12*s, -18*s, 5*s, 4*s); ctx.fillRect(25*s, -18*s, 5*s, 4*s); // Ears
            
            ctx.fillStyle = '#000';
            ctx.fillRect(17*s, -7*s, 3*s, 3*s); ctx.fillRect(25*s, -7*s, 3*s, 3*s); // Eyes
            ctx.fillStyle = '#ff99bb';
            ctx.fillRect(14*s, -2*s, 3*s, 3*s); ctx.fillRect(28*s, -2*s, 3*s, 3*s); // Cheeks
            ctx.fillStyle = '#000';
            ctx.fillRect(22*s, -2*s, 2*s, 1.5*s); // Tiny mouth

            ctx.restore();
        }

        function drawPipe(p) {
            const flow = (frames * 4) % 60;
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 3;
            const render = (y, h) => {
                ctx.fillStyle = '#010c1a';
                ctx.fillRect(p.x, y, 40, h);
                ctx.strokeRect(p.x, y, 40, h);
                ctx.save();
                ctx.beginPath(); ctx.rect(p.x + 4, y, 32, h); ctx.clip();
                ctx.fillStyle = 'rgba(0, 242, 255, 0.15)';
                for(let i = -60; i < h + 60; i += 60) {
                    ctx.fillRect(p.x + 4, y + i + flow, 32, 20);
                }
                ctx.restore();
            };
            render(0, p.top);
            render(p.top + p.gap, canvas.height);
        }

        function drawEnv() {
            // Moon (Static)
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.beginPath(); ctx.arc(canvas.width - 100, 100, 45, 0, Math.PI * 2); ctx.fill();

            // Clouds (Static)
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            clouds.forEach(c => {
                ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2); ctx.fill();
            });

            // Space Stars
            ctx.fillStyle = "white";
            bgStars.forEach(s => {
                ctx.fillRect(s.x, s.y, s.size, s.size);
                if (state === 'PLAYING') s.x -= s.speed;
                if (s.x < 0) s.x = canvas.width;
            });

            // Ground Spikes
            const sH = 50;
            const yB = canvas.height - sH;
            ctx.fillStyle = '#010410'; ctx.fillRect(0, yB, canvas.width, sH);
            ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 3;
            const off = (frames * 5) % 30;
            ctx.beginPath();
            for(let i=-30; i<canvas.width+30; i+=30) {
                ctx.moveTo(i-off, canvas.height); ctx.lineTo(i+15-off, yB); ctx.lineTo(i+30-off, canvas.height);
            }
            ctx.stroke();
        }

        function update() {
            if(state !== 'PLAYING') return;
            player.v += 0.25; player.y += player.v;
            updateParticles();

            if(frames % 95 === 0) {
                const g = 170; // Gap size
                const margin = 150;
                const t = Math.random()*(canvas.height - g - (margin*2)) + margin;
                pipes.push({x: canvas.width, top: t, gap: g, passed: false});
            }

            pipes.forEach((p, i) => {
                p.x -= 5;
                drawPipe(p);
                // Hitbox detection
                if(player.x+10 > p.x && player.x-10 < p.x+40 && (player.y-10 < p.top || player.y+10 > p.top+p.gap)) end();
                if(!p.passed && p.x < player.x) { score++; p.passed = true; scoreUI.innerText = score; }
                if(p.x < -100) pipes.splice(i, 1);
            });

            if(player.y > canvas.height - 50 || player.y < 0) end();
            frames++;
        }

        function end() {
            state = 'OVER';
            document.getElementById('over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = "Score: " + score;
            scoreUI.classList.add('hidden');
        }

        function start() {
            state = 'PLAYING'; score = 0; pipes = []; player.y = canvas.height/2; player.v = 0; 
            player.trail = []; player.stars = [];
            scoreUI.innerText = '0'; scoreUI.classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('over-screen').classList.add('hidden');
            frames = 0;
        }

        window.onmousedown = () => { if(state==='PLAYING') player.v = -5.5; };
        window.ontouchstart = (e) => { e.preventDefault(); if(state==='PLAYING') player.v = -5.5; };
        document.getElementById('start-btn').onclick = start;
        document.getElementById('retry-btn').onclick = start;

        function loop() {
            // Darker Sky
            ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawEnv();
            update();
            drawCat(player.x, player.y);
            requestAnimationFrame(loop);
        }
        resize(); loop();
    </script>
</body>
</html>
